# Quality Gate — pre-commit framework Entrypoint
#
# Activate (preferred):
#   make hooks-install
#
# Or manually:
#   pre-commit install
#   pre-commit run --all-files
#
# This config owns the sole Git pre-commit Entrypoint. Do not set
# core.hooksPath to a second hook tree alongside it.
#
# Domains:
#   - File Hygiene Gate
#   - Doc Quality Gate (Strict Doc Profile; non-Docker markdownlint-cli2)
#   - Shell Quality Gate (RaVN local hook: .git-hooks/ravn-shell-quality)
#
# Node is pinned so pre-commit does not use system npm (npm 12+ rejects
# flags that older pre-commit node env install paths still pass).
#
# Selective Hook Skip (shell only):
#   SKIP=ravn-shell-quality git commit
# Full Gate Bypass:
#   git commit --no-verify

default_language_version:
  node: 20.18.1

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-xml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md,mdx"]

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: node
        language_version: "20.18.1"
        additional_dependencies: ["markdownlint-cli2@0.17.2"]
        entry: markdownlint-cli2
        types: [markdown]
        # Local Agent Tree is gitignored; optional defense in depth for force-adds.
        exclude: ^\.agents/

      # Shell Quality Gate: RaVN-owned script discovers staged shell itself.
      - id: ravn-shell-quality
        name: ravn-shell-quality
        language: system
        entry: .git-hooks/ravn-shell-quality
        pass_filenames: false
        always_run: true
